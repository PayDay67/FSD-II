name: Experiment-16 CI/CD

on:
  push:
    branches: [main]
    paths:
      - "Experiment-16/**"
  pull_request:
    branches: [main]
    paths:
      - "Experiment-16/**"

jobs:
  backend-test:
    name: Backend Tests (Flask/Pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('Experiment-16/Backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: Experiment-16/Backend
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r requirements.txt

      - name: Run tests
        working-directory: Experiment-16/Backend
        run: pytest test_app.py -v --cov=app --cov-report=term-missing

  frontend-test:
    name: Frontend Tests (Vite/Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: Experiment-16/Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Experiment-16/Frontend
        run: npm install

      - name: Run tests
        working-directory: Experiment-16/Frontend
        run: npm run test -- --run

  deploy:
    name: Deploy Frontend (GitHub Pages)
    runs-on: ubuntu-latest
    needs: [frontend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: Experiment-16/Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Experiment-16/Frontend
        run: npm install

      - name: Build frontend
        working-directory: Experiment-16/Frontend
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Experiment-16/Frontend/dist
          publish_branch: gh-pages
          commit_message: "Deploy frontend to GitHub Pages"
